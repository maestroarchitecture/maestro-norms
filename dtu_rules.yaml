# dtu_rules.yaml — Étage 0 : règles normatives chiffrées déterministes par lot
# ----------------------------------------------------------------------------
# Lookup ~0 token (cf. tools/dtu_rules.py). Chaque règle = un FAIT paraphrasé
# {exigence, seuil, condition, ref} — JAMAIS le texte verbatim du DTU/NF (droit
# d'auteur). La `ref` est une CITATION (on cite la clause, on ne recopie pas sa
# prose). Champs additionnels d'audit : `statut` (verifie | a_verifier) et
# `source` (URL + clause lue) — non consommés par le devis (justification_rows
# n'émet que les 4 champs), mais permettent de re-vérifier chaque seuil.
#
# GARDE-FOU : ne JAMAIS sortir un seuil de mémoire (risque client). Seules les
# règles `statut: verifie` (source primaire lue + recoupée) figurent ici.

meta:
  generated: "2026-06-19"
  licence: "Faits/seuils paraphrasés — AUCUN texte DTU/NF verbatim. ref = citation seule."
  verification: >-
    Lot 04 : sources PRIMAIRES lues verbatim — Arrêté du 24 mars 1982 (Legifrance,
    réglementaire, art. 3 et 4) pour les débits de ventilation ; NF DTU 24.1 P1-1-1
    (sept. 2020) et NF DTU 65.14 P1-1-1 (juil. 2023) lus dans le Reef (CSTB/AFNOR).
    Lot 05 : NF C 15-100 (AFNOR, hors Reef) — valeurs recoupées sur ≥3 sources
    autoritaires concordantes (Promotelec, repereelec, guide complet). Réfs mises à jour
    vers l'ÉDITION 2024 (série obligatoire depuis sept. 2025) ; valeurs résidentielles
    partie 10 issues de l'amendement A5. TODO (via Reef) : intégrer les nouveautés 2024 —
    DDR type F (PAC/clim), détecteurs d'arc (DPDA), partie IRVE 7-722.
  sources_primaires:
    arrete_24_03_1982: "https://www.legifrance.gouv.fr/loda/id/JORFTEXT000000862344"
    nf_dtu_24_1_p1_1_1: "Reef batipedia.com — code ALUF-1 (sept. 2020)"
    nf_dtu_65_14_p1_1_1: "Reef batipedia.com — code ANVY-1 (juil. 2023)"

rules:
  # =====================================================================
  # LOT 02 — Plâtrerie / Cloisons  (NF DTU 25.41 — plaques de plâtre)
  # SOURCE REEF : ABCR-5 = NF DTU 25.41 P1-1 (CCT, février 2022), lu verbatim.
  # =====================================================================
  "02":
    - exigence: "Tolérance de planéité locale du parement fini (ouvrages verticaux), notamment au droit des joints"
      seuil: "Réglet de 0,20 m : écart maximal (point le plus saillant au plus en retrait) ≤ 1 mm ; pas de manque ni de changement de plan brutal entre plaques"
      condition: "Cloisons / contre-cloisons verticales terminées, parement prêt à recevoir la finition"
      ref: "NF DTU 25.41 P1-1 (février 2022) §6.6.2.1"
      statut: verifie
      source: "Reef ABCR-5 §6.6.2.1 — lu verbatim 2026-06-19"

    - exigence: "Tolérance de planéité générale et d'aplomb du parement fini (ouvrages verticaux)"
      seuil: "Règle de 2 m promenée en tous sens : écart ≤ 5 mm ; faux aplomb ≤ 5 mm sur une hauteur d'étage courante (~2,50 m)"
      condition: "Ouvrages verticaux terminés ; planéité réglée à la règle de 2 m à la pose"
      ref: "NF DTU 25.41 P1-1 (février 2022) §6.6.2.2 et §6.6.2.3"
      statut: verifie
      source: "Reef ABCR-5 §6.6.2.2/§6.6.2.3 — lu verbatim 2026-06-19"

    - exigence: "Entraxe maximal de l'ossature support des plaques pour ouvrages horizontaux/inclinés (plafonds)"
      seuil: "≤ 0,60 m en pose perpendiculaire ; ramené à 0,50 m si hygrométrie > 80 % HR ou chape fluide ; pose parallèle admise à ≤ 0,40 m"
      condition: "Plafonds (ouvrages horizontaux/inclinés) — distinct de l'entraxe des montants de cloison verticale"
      ref: "NF DTU 25.41 P1-1 (février 2022) §6.2.2.4 / §6.2.4.1"
      statut: verifie
      source: "Reef ABCR-5 §6.2.2.4/§6.2.4.1 — lu verbatim 2026-06-19"

    - exigence: "Entraxe des montants des cloisons et contre-cloisons sur ossature (selon hauteur et parement)"
      seuil: "Déterminé par les Tableaux 10/11 (cloisons) et 15/16 (contre-cloisons) selon hauteur et type de plaques ; extensible à 0,90 m uniquement avec justification par essais aux chocs (Annexes D/E). Ossature bois : montant ép. ≥ 47 mm, largeur d'appui ≥ 45 mm"
      condition: "Cloisons (§6.3) et contre-cloisons (§6.4) sur ossature ; pas de valeur unique (dépend de la hauteur)"
      ref: "NF DTU 25.41 P1-1 (février 2022) §6.3.2, §6.4, §6.3.2.3"
      statut: verifie
      source: "Reef ABCR-5 §6.3.2/§6.4/§6.3.2.3 — lu verbatim 2026-06-19"

    - exigence: "Fixation des plaques par vis : longueur, distance aux bords et espacement"
      seuil: "Vis sur ossature métallique : longueur ≥ épaisseur totale des plaques + 10 mm (≥ 3 spires engagées) ; sur contre-ossature bois : + 20 mm. Points de fixation ≥ 10 mm des bords ; sur bois espacés ≤ 300 mm ; entraxe de vissage 0,25 m pour plaques de 900 mm de large (Tableau 14)"
      condition: "Pose vissée ; fixation sur rails tête/pied et sur tous les montants sur toute la hauteur ; au droit d'un joint, vis des deux plaques en vis-à-vis"
      ref: "NF DTU 25.41 P1-1 (février 2022) §6.1.3.1-6.1.3.2, §6.3.11.2 (Tableau 14)"
      statut: verifie
      source: "Reef ABCR-5 §6.1.3 — lu verbatim 2026-06-19"

    - exigence: "Traitement des joints entre plaques à bords amincis ; limites de la fixation directe par collage"
      seuil: "Joints à bords amincis : enduit au fond du creux + bande à joint papier centrée, serrage de l'excédent, recouvrement à l'enduit après durcissement. Collage direct (mortier adhésif) : limité à 2 plaques superposées, hauteur ≤ 6 m, irrégularité du support ≤ 15 mm"
      condition: "Collage réservé aux supports continus traditionnels (béton, briques, carreaux de plâtre) secs/sains/non pulvérulents"
      ref: "NF DTU 25.41 P1-1 (février 2022) §6.1.4.2, §6.1.3.3"
      statut: verifie
      source: "Reef ABCR-5 §6.1.4.2/§6.1.3.3 — lu verbatim 2026-06-19"

    - exigence: "Plots de mortier-adhésif pour le collage des complexes de doublage (isolant alvéolaire)"
      seuil: "Plots d'environ 10 cm de diamètre et ~15 mm d'épaisseur, espacés d'environ 30 cm horizontalement et 40 cm verticalement ; OU bandes de 5 à 10 cm de large entrecroisées espacées d'environ 30 cm (non parfaitement continues, pour éviter l'effet de ventouse). Plots à base de plâtre : épaisseur ≤ 15 mm. Isolants fibreux (laine) : application en 2 passes"
      condition: "Pose collée de complexes/sandwiches de doublage au mortier-adhésif"
      ref: "NF DTU 25.42 P1-1 (décembre 2012, Amdt A1) §6.2.2.1, §6.3.1"
      statut: verifie
      source: "Reef AETD-2 §6.2.2/§6.3.1 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Jeux de pose du complexe de doublage collé"
      seuil: "Complexe buté en tête sous le plafond ; espace en pied d'environ 10 mm (selon hauteur hors-tout du complexe et précision de la hauteur sous plafond) ; jeu d'environ 10 mm entre le dernier panneau et le gros œuvre ; affleurement achevé par chocs à la règle"
      condition: "Mise en œuvre du complexe collé à l'avancement"
      ref: "NF DTU 25.42 P1-1 (décembre 2012) §6.3.2"
      statut: verifie
      source: "Reef AETD-2 §6.3.2 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "État du support pour la pose collée d'un doublage"
      seuil: "Support sain (sans poussière, graisse, huile), ne ressuant pas d'humidité ; régularité permettant le collage (désaffleurements/irrégularités admissibles selon le type de colle). Supports anciens : reconnaissance préalable (cohésion, adhérence), fissures importantes rebouchées au préalable"
      condition: "Avant collage du doublage ; supports neufs ou anciens"
      ref: "NF DTU 25.42 P1-1 (décembre 2012) §6.2.2"
      statut: verifie
      source: "Reef AETD-2 §6.2.2 — lu 2026-06-29 (validé Namur 2026-06-29)"

  # =====================================================================
  # LOT 03 — Plomberie / Sanitaires  (NF DTU 60.11 — règles de calcul)
  # =====================================================================
  "03":
    - exigence: "Débits minimaux de calcul et diamètres intérieurs minimum des canalisations d'alimentation par appareil sanitaire"
      seuil: "Évier 0,20 l/s (Ø 12 mm) ; lavabo/bidet 0,20 (Ø 10) ; baignoire 0,33 (Ø 13) ; douche 0,20 (Ø 12) ; WC à réservoir 0,12 (Ø 10) ; lave-mains 0,10 (Ø 10) ; lave-linge 0,20 (Ø 10) ; lave-vaisselle 0,10 (Ø 10)"
      condition: "Réseaux EFS/ECS, appareils pris individuellement (méthode générale)"
      ref: "NF DTU 60.11 P1-1 (août 2013) §3.2.1, Tableau 1"
      statut: verifie
      source: "Reef AESP-1 §3.2.1 Tableau 1 — lu verbatim 2026-06-18"

    - exigence: "Hauteur de pose des lavabos suspendus"
      seuil: "85 à 95 cm du sol fini, mesurés à la partie supérieure de la plage de robinetterie au droit du trou de robinetterie (sauf précision des DPM)"
      condition: "Lavabos suspendus ; exigences d'accessibilité PMR régies par la réglementation"
      ref: "NF DTU 60.1 P1-1-3 (décembre 2012) §4.2.1"
      statut: verifie
      source: "Reef AESM-1 §4.2.1 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Fixation des lavabos suspendus"
      seuil: "Goujons / tiges filetées métalliques de Ø ≥ 8 mm ; colonne ou cache-siphon NON comptés comme support ; contact lavabo / parties métalliques proscrit ; appui via mastic sanitaire ou joint préformé / feuille résiliente"
      condition: "Lavabo fixé directement ou par consoles (cf. Tableau 1)"
      ref: "NF DTU 60.1 P1-1-3 (décembre 2012) §4.2.1 (Tableau 1)"
      statut: verifie
      source: "Reef AESM-1 §4.2.1 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Hauteur de pose des cuvettes de WC suspendues"
      seuil: "38 à 50 cm du sol fini (sauf précision des DPM) ; WC à réservoir de moins de 6 L non visés (étude de conception spécifique)"
      condition: "WC suspendus sur bâti-support ; accessibilité PMR régie par la réglementation"
      ref: "NF DTU 60.1 P1-1-3 (décembre 2012) §4.2.5"
      statut: verifie
      source: "Reef AESM-1 §4.2.5 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Fixation et habillage des cuvettes de WC suspendues sur bâti-support"
      seuil: "Tiges filetées métalliques de Ø ≥ 10 mm ; habillage ne permettant pas le poinçonnement par l'appareil (ex. BA13 hydrofuge carrelé ou panneau médium 16 mm) ; contact WC / parties métalliques proscrit ; appui via mastic sanitaire ou joint préformé / feuille résiliente"
      condition: "Cuvette WC suspendue sur bâti-support (fixé selon Tableau 1)"
      ref: "NF DTU 60.1 P1-1-3 (décembre 2012) §4.2.5"
      statut: verifie
      source: "Reef AESM-1 §4.2.5 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Calage du fond des receveurs de douche en céramique"
      seuil: "Au moins 4 supports rigides d'environ 10 × 10 cm répartis uniformément sous le fond ; ≥ 5 supports si une dimension du receveur ≥ 90 cm ; supports maçonnés scellés sur chape/dalle ; mortier maigre uniquement (contact d'un liant à base de plâtre proscrit) ; niveau des bords ajusté au calage"
      condition: "Receveur de douche céramique nécessitant un calage du fond"
      ref: "NF DTU 60.1 P1-1-3 (décembre 2012) §4.2.9.1"
      statut: verifie
      source: "Reef AESM-1 §4.2.9.1 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Jeu périphérique (mouvements relatifs) des receveurs de douche et baignoires par rapport aux parois"
      seuil: "Espace libre d'au moins 5 mm entre les bords de l'appareil et les parois ; étanchéité par mastic sanitaire (fond de joint mousse possible) ; scellement de l'appareil contre ou dans les parois proscrit ; liaison revêtement/appareil par mastic sanitaire de finition réalisé sans interruption (matériau à base de ciment proscrit)"
      condition: "Receveurs (céramique ou acrylique) et baignoires (acrylique, acier émaillé)"
      ref: "NF DTU 60.1 P1-1-3 (décembre 2012) §4.2.9.2/.3, §4.2.10.4, §4.2.11.3, §4.2.12"
      statut: verifie
      source: "Reef AESM-1 §4.2.9–4.2.12 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Supportage des receveurs de douche et baignoires en acrylique (appareils non autoportants)"
      seuil: "Supportage du fond ET de la périphérie. Fond : piètement fourni, ou ≥ 4 supports rigides (brique/parpaing/béton cellulaire) d'environ 10 × 10 cm pour un receveur de 80 × 80 cm (davantage au-delà), scellés au mortier adhésif. Périphérie sur TOUS les côtés : côté parois = profilé imputrescible fixé au mur OU maçonnerie hydrofuge (carreau de plâtre hydro, béton cellulaire) avec joint d'appui mousse intercalé ; bords libres = maçonnerie hydrofuge. Trappe(s) de visite pour l'accès robinetterie/vidage ; tous les pieds en contact avec le sol"
      condition: "Receveurs/baignoires acryliques fournis sans structure (non autoportants) ; aucune modification de l'appareil hors perçage robinetterie"
      ref: "NF DTU 60.1 P1-1-3 (décembre 2012) §4.2.10, §4.2.11"
      statut: verifie
      source: "Reef AESM-1 §4.2.10/§4.2.11 — lu 2026-06-29 (validé Namur 2026-06-29)"

  # =====================================================================
  # LOT 04 — Chauffage / VMC  (débits réglementaires + DTU fumisterie + PCBT)
  # =====================================================================
  "04":
    # --- Ventilation : débits d'extraction (Arrêté 24/03/1982, source primaire) ---
    - exigence: "Débit d'air extrait minimal en cuisine (ventilation générale et permanente)"
      seuil: "75 / 90 / 105 / 120 / 135 m³/h pour 1 / 2 / 3 / 4 / 5 pièces principales et plus"
      condition: "Logement ; débit plus faible admis si une hotte est raccordée à l'extraction"
      ref: "Arrêté du 24 mars 1982, art. 3 (débits repris par le NF DTU 68.3)"
      statut: verifie
      source: "Legifrance LEGIARTI000006830557 (art. 3) — tableau lu verbatim 2026-06-18"
      # check : seuil contextualisable au nb de pièces principales (étage 0 — éval déterministe)
      check:
        type: ventilation_debit
        piece: cuisine
        unit: "m³/h"
        min_by_pieces: { "1": 75, "2": 90, "3": 105, "4": 120, "5+": 135 }

    - exigence: "Débit d'air extrait minimal en salle de bains ou de douches"
      seuil: "15 m³/h (logement de 1 à 2 pièces principales) ; 30 m³/h (3 pièces et plus)"
      condition: "Autre salle d'eau : 15 m³/h quel que soit le nombre de pièces"
      ref: "Arrêté du 24 mars 1982, art. 3"
      statut: verifie
      source: "Legifrance LEGIARTI000006830557 (art. 3) — tableau lu verbatim 2026-06-18"
      check:
        type: ventilation_debit
        piece: sdb
        unit: "m³/h"
        min_by_pieces: { "1": 15, "2": 15, "3+": 30 }

    - exigence: "Débit d'air extrait minimal au cabinet d'aisances (WC)"
      seuil: "WC unique : 15 m³/h (1 à 3 pièces), 30 m³/h (4 pièces et plus) ; WC multiple : 15 m³/h"
      condition: "Pièce de service ; logement 1 pièce : sortie commune SdB+WC contigus admise à 15 m³/h"
      ref: "Arrêté du 24 mars 1982, art. 3"
      statut: verifie
      source: "Legifrance LEGIARTI000006830557 (art. 3) — tableau lu verbatim 2026-06-18"
      # PAS de check : le débit WC dépend du nombre de WC (unique 15→30 / multiple 15),
      # non déductible du seul nb de pièces principales → reste générique « à vérifier »
      # (revue Codex GitHub, P2 — éviter de surestimer sur les plans multi-WC).

    - exigence: "Débit total extrait réduit minimal admis (ventilation à débit modulé)"
      seuil: "Dispositif de réglage : 35→135 m³/h (1 à 7 pièces), cuisine réduite ≥ 20→45 m³/h ; modulation automatique : 10→35 m³/h (1 à 7 pièces)"
      condition: "Modulation automatique soumise à autorisation ministérielle"
      ref: "Arrêté du 24 mars 1982, art. 4 (modifié par arrêté du 28 oct. 1983)"
      statut: verifie
      source: "Legifrance LEGIARTI000006830558 (art. 4) — tableaux lus verbatim 2026-06-18"

    # --- Fumisterie : conduit de fumée bois/granulés (NF DTU 24.1, source primaire) ---
    - exigence: "Position du débouché du conduit de fumée au-dessus de la toiture (poêle/chaudière bois ou granulés)"
      seuil: "≥ 0,40 m au-dessus de toute construction distante de moins de 8 m ; toiture-terrasse ou pente < 15° : ≥ 1,20 m au-dessus du point de sortie et ≥ 1 m au-dessus de l'acrotère (si acrotère > 0,20 m)"
      condition: "Appareils à combustible solide ≤ 85 kW (puissance utile ≤ 70 kW)"
      ref: "NF DTU 24.1 P1-1-1 (sept. 2020) §5.4.6 (renvoi arrêté 22 oct. 1969, art. 18)"
      statut: verifie
      source: "Reef ALUF-1 §5.4.6 — lu verbatim 2026-06-18"

    # --- Plancher chauffant à eau basse température (NF DTU 65.14, source primaire) ---
    - exigence: "Température maximale au contact du sol fini d'un plancher chauffant à eau"
      seuil: "≤ 28 °C dans les conditions de base ; espacement entre tubes ≤ 35 cm"
      condition: "Mode chauffage ; plancher chauffant ou chauffant réversible à eau"
      ref: "NF DTU 65.14 P1-1-1 (juil. 2023) §7.5.1 (renvoi arrêté 23 juin 1978, art. 35)"
      statut: verifie
      source: "Reef ANVY-1 §7.5.1 — lu verbatim 2026-06-18"

    - exigence: "Limitation et sécurité de la température du fluide caloporteur d'un plancher chauffant à eau"
      seuil: "Dispositif limitant le fluide à 50 °C ; sécurité indépendante à réarmement manuel coupant la chaleur à 65 °C"
      condition: "Mode chauffage ; sécurité fonctionnant même hors tension"
      ref: "NF DTU 65.14 P1-1-1 (juil. 2023) §7.1.1 et §7.2.1"
      statut: verifie
      source: "Reef ANVY-1 §7.1–7.2 — lu verbatim 2026-06-18"

    - exigence: "Étanchéité à l'air des réseaux de ventilation mécanique"
      seuil: "Emboîtements complets (bords de conduits en contact avec les bords d'arrêt) maintenus par une liaison mécanique (rivets, encoches…) ; privilégier les accessoires à dispositif d'étanchéité intégré (bandes adhésives / mastic seulement si l'espace le permet). Jonction extraction/conduit et conduit/paroi support étanches à l'air ; manchette de raccordement scellée tout en gardant l'amovibilité du dispositif. Classe d'étanchéité visée mesurée selon FD E 51-767"
      condition: "Réseaux aérauliques de VMC ; classe d'étanchéité fixée au projet"
      ref: "NF DTU 68.3 P1-1-1 (juin 2013) §6.4.1"
      statut: verifie
      source: "Reef AEZJ-2 §6.4.1 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Trappes de visite pour l'entretien des réseaux (habitat collectif)"
      seuil: "Implantation conforme à la NF EN 12097 : typologie et dimensions des ouvertures selon le conduit, emplacement et nombre de panneaux d'accès pour le réseau, nettoyabilité ; panneaux ouvrables/refermables à plusieurs reprises sans couper ni endommager le conduit"
      condition: "Réseaux aérauliques neufs en habitat collectif"
      ref: "NF DTU 68.3 P1-1-1 (juin 2013) §6.4.2"
      statut: verifie
      source: "Reef AEZJ-2 §6.4.2 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Alarme de défaillance des installations collectives de ventilation"
      seuil: "Système d'alarme fonctionnant automatiquement en cas d'arrêt de l'extracteur (un seul système pour des extracteurs fonctionnant simultanément dans un même logement) ; soit télétransmise dans un local de fonction, soit visible et lumineuse"
      condition: "Installations collectives de ventilation mécanique"
      ref: "NF DTU 68.3 P1-1-1 (juin 2013) §6.4.3"
      statut: verifie
      source: "Reef AEZJ-2 §6.4.3 — lu 2026-06-29 (validé Namur 2026-06-29)"

  # =====================================================================
  # LOT 05 — Électricité  (NF C 15-100, partie 7-771 « Locaux d'habitation » — hors Reef)
  # SOURCES (NF C 15-100 absente du Reef de Namur) :
  #  - VALEURS EN VIGUEUR (édition 2024 / amendement A5) : Guide Legrand NF C 15-100 (rév.
  #    23 août 2024) + Promotelec « Installations électriques privatives » — docs locaux de
  #    Namur (~/Projects/PHD/maestro-ref/dtu). Lus verbatim 2026-06-19.
  #  - Texte officiel AFNOR sur disque = FA005536 = NF C 15-100 DÉCEMBRE 2002 + A1/A2 (515 p.) :
  #    donne la STRUCTURE officielle (partie 771) MAIS édition PÉRIMÉE (antérieure à l'A5 de
  #    2015 et à la révision 2024) → ses VALEURS ne sont PAS à jour, donc non utilisées ici.
  #    (Pour le texte exact en vigueur : il faudrait l'édition AFNOR août 2024.)
  #  - Garde-fou AFNOR (le doc s'oppose à l'usage par IA) : on n'extrait que des FAITS/seuils
  #    (non protégeables) en citation seule, jamais le verbatim de la prose.
  # =====================================================================
  "05":
    - exigence: "Protection différentielle haute sensibilité de tous les circuits terminaux"
      seuil: "DDR ≤ 30 mA ; au moins 2 interrupteurs différentiels ; au plus 8 circuits protégés par différentiel"
      condition: "Type A exigé pour cuisson, lave-linge et IRVE ; type AC minimum pour les autres circuits"
      ref: "NF C 15-100 (édition 2024, en vigueur depuis sept. 2025 ; règle issue de l'amendement A5 de 2015, reconduite pour le résidentiel)"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.12-13 — lu verbatim 2026-06-19"

    - exigence: "Nombre minimal de socles de prise de courant 16 A dans le séjour"
      seuil: "1 socle par tranche de 4 m², minimum 5 (séjour ≤ 28 m²) ; minimum 7 au-delà de 28 m²"
      condition: "Pièce principale 'séjour' ; socles non commandés"
      ref: "NF C 15-100 (édition 2024, en vigueur depuis sept. 2025 ; valeurs résidentielles partie 10 issues de l'amendement A5)"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.24-25 — lu verbatim 2026-06-19"

    - exigence: "Nombre minimal de socles de prise de courant 16 A par chambre"
      seuil: "3 socles minimum par chambre"
      condition: "Chambre (pièce principale)"
      ref: "NF C 15-100 (édition 2024, en vigueur depuis sept. 2025 ; valeurs résidentielles partie 10 issues de l'amendement A5)"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.16-25 — lu verbatim 2026-06-19"

    - exigence: "Socles de prise de courant non spécialisés en cuisine"
      seuil: "6 socles (dont 4 répartis au-dessus du plan de travail) sur circuit dédié ; 3 socles si cuisine ≤ 4 m²"
      condition: "Cuisine > 4 m² ; les 6 socles non spécialisés disposent d'un circuit dédié"
      ref: "NF C 15-100 (édition 2024, en vigueur depuis sept. 2025 ; valeurs résidentielles partie 10 issues de l'amendement A5)"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.24-25 — lu verbatim 2026-06-19"

    - exigence: "Circuit d'éclairage : section des conducteurs cuivre et calibre de protection"
      seuil: "1,5 mm² ; protection ≤ 16 A ; au plus 8 points lumineux par circuit"
      condition: "Au moins 2 circuits d'éclairage par logement (hors studio)"
      ref: "NF C 15-100 (édition 2024, en vigueur depuis sept. 2025 ; valeurs résidentielles partie 10 issues de l'amendement A5)"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.16-25 — lu verbatim 2026-06-19"

    - exigence: "Circuit de prises de courant 16 A : section et calibre selon le nombre de socles"
      seuil: "1,5 mm² → 16 A → 8 socles max ; ou 2,5 mm² → 20 A → 12 socles max"
      condition: "Prises 16 A non spécialisées ; comptage 1 socle = 1 prise"
      ref: "NF C 15-100 (édition 2024, en vigueur depuis sept. 2025 ; valeurs résidentielles partie 10 issues de l'amendement A5)"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.16-17/24-25 — lu verbatim 2026-06-19"

    - exigence: "Circuits spécialisés dédiés (gros électroménager) : section et calibre"
      seuil: "Lave-linge, lave-vaisselle, four : 2,5 mm² / 20 A, 1 circuit dédié chacun ; plaque de cuisson : 6 mm² / 32 A (monophasé)"
      condition: "Un circuit dédié par appareil ; conducteurs cuivre"
      ref: "NF C 15-100 (édition 2024, en vigueur depuis sept. 2025 ; valeurs résidentielles partie 10 issues de l'amendement A5)"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.16-25 — lu verbatim 2026-06-19"

    # --- Nouveautés de l'édition 2024 (recoupées ≥3 sources autoritaires, 2026-06-19) ---
    - exigence: "Protection différentielle de type F (et type B en triphasé) pour les circuits à variateur / composante haute fréquence"
      seuil: "DDR 30 mA de TYPE F en tête des circuits monophasés alimentant pompe à chaleur, climatisation, pompe de piscine et prises renforcées (équipements à variateur de vitesse monophasé) ; TYPE B (30 mA) pour ces mêmes usages en triphasé"
      condition: "Nouveauté édition 2024 ; le type F protège au moins comme le type A et résiste mieux aux déclenchements intempestifs"
      ref: "NF C 15-100 (édition 2024, en vigueur depuis sept. 2025)"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.12-13 — lu verbatim 2026-06-19"

    - exigence: "Dispositif de protection contre les défauts d'arc (DPDA / AFDD) — RECOMMANDÉ, non obligatoire"
      seuil: "Recommandé (non imposé) en tête des circuits 'prises de courant' de : locaux à sommeil HORS logement (foyers, EHPAD, hôtels) ; bâtiments patrimoniaux/historiques et biens irremplaçables (musées) ; locaux de stockage de matières inflammables (scieries, silos, ateliers) ; + circuits alimentant des équipements fonctionnant en permanence et d'accès difficile (VMC, pompes)"
      condition: "Édition 2024 ; recommandation. NB : vise les locaux à sommeil HORS logement — PAS les chambres d'un logement (correction vs 1re version web)"
      ref: "NF C 15-100 (édition 2024) — protection contre les arcs électriques"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.10-11 — lu verbatim 2026-06-19"

    - exigence: "Point de recharge de véhicule électrique (IRVE) : circuit dédié et protection (partie 7-722)"
      seuil: "Circuit spécialisé dédié (aucun autre appareil) + DDR 30 mA dédié. Monophasé : type A ou F + détection 6 mA DC (souvent intégrée à la borne). Triphasé : type B obligatoire. Dimensionnement : prise renforcée 3,7 kW → 16 A / 2,5 mm² / disj 20 A ; borne 7,4 kW → 32 A / 6 mm² (<15 m) / disj 40 A (monophasé) ; 22 kW → 32 A/phase / 10 mm² / disj 40 A tétrapolaire (triphasé)"
      condition: "NF C 15-100 partie 7-722 en vigueur depuis le 1er sept. 2025 ; sections à majorer selon la longueur (chute de tension)"
      ref: "NF C 15-100 partie 7-722 (édition 2024 ; applicable 01/09/2025)"
      statut: verifie
      source: "Guide Legrand NF C 15-100 (rév. 23 août 2024, doc local Namur) p.12-13 [circuit dédié, types A/F+6 mA DC / B, prise Green'up] + voltwork.fr [dimensionnement bornes 7,4/22 kW] — 2026-06-19"

    # --- Clauses de marché / exécution du lot Électricité (DTU 70.1 — SOURCE REEF, lu verbatim) ---
    - exigence: "Attestation de conformité Consuel et réception de l'installation électrique du logement"
      seuil: "Attestation(s) de conformité Consuel transmise(s) ≥ 20 jours avant la mise sous tension définitive ; le Consuel vise l'attestation ou signale les non-conformités sous 15 jours max ; essais/vérifications préalables selon l'article 6 de la NF C 15-100 ; réception prononcée selon NF P 03-001"
      condition: "Lot Électricité (installations intérieures NF C 15-100 §771/772 + branchement NF C 14-100), bâtiments d'habitation ; attestation établie par écrit par l'installateur (chacun pour sa partie en cas de pluralité)"
      ref: "DTU 70.1 (NF P80-201-2, mai 1998) §1, §7.2, §8.1–8.2 et Annexe A (renvoi arrêté du 17 oct. 1973)"
      statut: verifie
      source: "Reef ALR-1 §1/§7.2/§8/Annexe A — lu verbatim 2026-06-19"

  # =====================================================================
  # LOT 06 — Menuiseries intérieures  (NF DTU 36.2 — menuiserie int. bois)
  # SOURCE REEF : AHHV-2 = NF DTU 36.2 P1-1 (CCT, novembre 2025), lu verbatim.
  # =====================================================================
  "06":
    - exigence: "Conditions préalables à la pose des menuiseries intérieures (ambiance, humidité)"
      seuil: "Humidité relative des locaux 40–60 % à 20 °C ; bois stabilisé selon le local : 7–9,9 % d'humidité (faible hygrométrie) ou 10–13 % (hygrométrie moyenne) ; pose sur paroi maçonnée seulement si le support contient moins de 5 % d'eau"
      condition: "Travaux exécutés après mise hors d'eau / hors d'air, ambiance de pose stabilisée"
      ref: "NF DTU 36.2 P1-1 (novembre 2025) §5.4"
      statut: verifie
      source: "Reef AHHV-2 §5.4 — lu verbatim 2026-06-19"

    - exigence: "Tolérances de pose du dormant (bâti/huisserie) — ouvrage fini"
      seuil: "Aplomb des montants ≤ 2 mm/m (dans le plan de la cloison) ; rectitude/parallélisme des montants ≤ 2 mm dans tous les plans ; rectitude et niveau de la traverse ≤ 2 mm au 1er mètre puis +1 mm par mètre supplémentaire, maximum 4 mm ; équerrage après pose ≤ 2 mm"
      condition: "Dormants bois / à base de bois / métalliques, ouvrage fini"
      ref: "NF DTU 36.2 P1-1 (novembre 2025) §6.8.1"
      statut: verifie
      source: "Reef AHHV-2 §6.8.1 — lu verbatim 2026-06-19"

    - exigence: "Tolérances et jeux du vantail posé sur dormant (ouvrage fini)"
      seuil: "Jeux apparents entre dormant et vantail (et au battement des portes à 2 vantaux) ≤ 3 mm pour les portes finies, ≤ 5 mm pour les portes à peindre ; variation de jeu ≤ 1 mm par mètre ; affleurement du vantail par rapport au nu du dormant ≤ 1 mm"
      condition: "Vantail bois / à base de bois sur dormant mis en œuvre"
      ref: "NF DTU 36.2 P1-1 (novembre 2025) §6.8.2"
      statut: verifie
      source: "Reef AHHV-2 §6.8.2 — lu verbatim 2026-06-19"

    - exigence: "Fixation des dormants (huisseries / bâtis) des menuiseries intérieures"
      seuil: "Montant SANS organe de rotation : ≥ 3 fixations (dont une en pied), entraxe ≤ 950 mm ; pied de montant : ≥ 1 fixation au sol/paroi à ≤ 200 mm du sol fini ; montant AVEC organes de rotation : une fixation près de chaque organe (+ 1 si entraxe des organes > 950 mm). Traverse : fixation requise si l'ouvrant fait > 0,93 m de large (et jeu ≥ 15 mm en tout point de la baie)"
      condition: "Dormants bois / à base de bois / métalliques ; fixations adaptées au support"
      ref: "NF DTU 36.2 P1-1 (novembre 2025) §6.1.1"
      statut: verifie
      source: "Reef AHHV-2 §6.1.1 — lu verbatim 2026-06-19"

    - exigence: "Affleurement des tringles de crémone / verrou (position ouverte) par rapport aux rives de l'ouvrant"
      seuil: "Extrémités des tringles affleurant les rives haute et basse du vantail à ± 1 mm ; extrémités taillées en léger biseau pour faciliter l'empennage sans nuire au verrouillage"
      condition: "Crémones en applique et verrous à larder (organes de fermeture) posés sur l'ouvrant"
      ref: "NF DTU 36.2 P1-1 (novembre 2025) §6.9.3.1"
      statut: verifie
      source: "Reef AHHV-2 §6.9.3.1 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Position de l'arrêt de porte sur la largeur du vantail"
      seuil: "Arrêt de porte placé au-delà du 2e tiers de la largeur du vantail, mesuré depuis l'axe de rotation (évite l'effet de bras de levier qui détériore le bloc-porte)"
      condition: "Mise en œuvre d'un arrêt de porte (quincaillerie)"
      ref: "NF DTU 36.2 P1-1 (novembre 2025) §6.9.4"
      statut: verifie
      source: "Reef AHHV-2 §6.9.4 — lu 2026-06-29 (validé Namur 2026-06-29)"

  # =====================================================================
  # LOT 07 — Menuiseries extérieures  (NF DTU 36.5 — pose fenêtres/portes ext.)
  # SOURCE REEF : ABKY-1 = NF DTU 36.5 P1-1 (CCT, avril 2010) ; choix AEV : ABKZ-1 (P1-2)
  # renvoie au FD DTU 36.5 P3 = ACJL-1 (Tableau 8 récap, lu verbatim image par image).
  # =====================================================================
  "07":
    - exigence: "Calage et fixation des fenêtres et portes extérieures (mise en œuvre, travaux neufs)"
      seuil: "Cales d'assise en sous-face de la traverse basse, au voisinage des montants ; distance libre entre cales ≤ 30 cm ; distance maximale entre deux fixations ≤ 0,80 m ; chaque cale et chaque fixation doit supporter une charge ponctuelle de 100 daN sans altération. Fixations par pointes interdites ; collage ou injection de mousse seuls non admis"
      condition: "Travaux neufs ; les fixations transmettent au gros œuvre les efforts (vent, manœuvre des vantaux)"
      ref: "NF DTU 36.5 P1-1 (avril 2010) §5.2–5.3"
      statut: verifie
      source: "Reef ABKY-1 §5.2/§5.3 — lu verbatim 2026-06-19"

    - exigence: "Calfeutrement périphérique (étanchéité à l'air et à l'eau) des menuiseries extérieures"
      seuil: "Joint de calfeutrement par mastic sur fond de joint ; largeur maximale du joint entre fenêtre et support ≤ 30 mm ; longueur de cheminement de l'eau ≥ 30 mm (calfeutrement humide renforcé) ; le calfeutrement par mastic ne doit pas être revêtu de peinture/enduit"
      condition: "La classe AEV (air/eau/vent) de la menuiserie est choisie selon l'exposition — cf. NF DTU 36.5 P1-2 (CGM), à sourcer"
      ref: "NF DTU 36.5 P1-1 (avril 2010) §5.9"
      statut: verifie
      source: "Reef ABKY-1 §5.9 — lu verbatim 2026-06-19"

    # --- Choix de la classe AEV selon l'exposition (P1-2 → FD DTU 36.5 P3 = ACJL-1) ---
    - exigence: "Choix de la classe AEV (air/eau/vent) des fenêtres et portes extérieures selon l'exposition"
      seuil: "Classes minimales A*E*V* lues au Tableau 8 récapitulatif du FD DTU 36.5 P3 par croisement région climatique (1–4 métropole) × catégorie de terrain (IV/IIIb/IIIa/II/0) × classe de hauteur (≤9 / ≤18 / ≤28 / ≤50 / ≤100 m). Performances déclarées selon NF EN 14351-1. À défaut de spécifications particulières, ces minima s'appliquent (non abaissables sous les minima)"
      condition: "P1-2 (CGM) renvoie au FD DTU 36.5 P3 pour la sélection ; le maître d'œuvre vérifie que le site / la forme du bâtiment n'exige pas mieux"
      ref: "NF DTU 36.5 P1-2 (avril 2010) §4.1.1-4.1.2 ; FD DTU 36.5 P3 (octobre 2010) §6 et §10 (Tableau 8)"
      statut: verifie
      source: "Reef ABKZ-1 §4.1 + ACJL-1 §6/§10 — lu verbatim 2026-06-19"

    - exigence: "Classe de résistance au vent V* des menuiseries extérieures"
      seuil: "France métropolitaine : de V*A2 (région 1, terrain IV, H ≤ 9 m) à V*A5 (région 4, terrain 0, 50 < H ≤ 100 m). Indice de rigidité A = flèche ≤ 1/150 de la portée (indice C = ≤ 1/300 : fenêtres juxtaposées / chocs de sécurité) ; pression d'essai P3 ≥ 1200 Pa, rigidité sous P1 ≥ 800 Pa (P1 = P3/1,5)"
      condition: "Selon NF EN 12210/12211 ; croisement région × terrain × hauteur (Tableaux 3 et 8 du FD P3)"
      ref: "FD DTU 36.5 P3 (octobre 2010) §7 et Tableau 8 ; NF EN 12210 ; NF EN 1991-1-4/NA"
      statut: verifie
      source: "Reef ACJL-1 §7/§10 — lu verbatim 2026-06-19"

    - exigence: "Classe de perméabilité à l'air A* des menuiseries extérieures (locaux chauffés)"
      seuil: "France métropolitaine : A*2 à A*3 (Tableau 8). Locaux non chauffés : classe immédiatement inférieure admise ; locaux climatisés : A*3 minimum recommandé ; coffre de volet roulant : perméabilité ≤ 12,5 m³/h.m sous 100 Pa (NF P 20-501)"
      condition: "Fenêtres de locaux chauffés (température normale > 12 °C) ; selon NF EN 12207 / NF EN 14351-1"
      ref: "FD DTU 36.5 P3 (octobre 2010) §8 et Tableau 8 ; NF EN 12207"
      statut: verifie
      source: "Reef ACJL-1 §8/§10 — lu verbatim 2026-06-19"

    - exigence: "Classe d'étanchéité à l'eau E* des menuiseries extérieures"
      seuil: "France métropolitaine : de E*4 (région 1, abrité) à E*8 (région 4, terrain 0, bâtiment haut). Fenêtre de toit : ≥ E*8A. Ouvrage partiellement protégé (débord L ≥ 0,15 m et L/C ≥ 3) : indice B admis de 2B à 7B (indice A dès la classe 8). Ouvrage protégé : classes réduites sans descendre sous E*1 (fenêtres) / E*0 (portes)"
      condition: "Fenêtres et portes ext. de MI et logements sur coursive ; selon NF EN 12208 ; croisement région × terrain × hauteur × protection (Tableaux 5/6/7/8)"
      ref: "FD DTU 36.5 P3 (octobre 2010) §9 et Tableau 8 ; NF EN 12208"
      statut: verifie
      source: "Reef ACJL-1 §9/§10 — lu verbatim 2026-06-19"

  # =====================================================================
  # LOT 08 — Carrelage / Faïence  (NF DTU 52.2 — pose collée)
  # =====================================================================
  "08":
    - exigence: "Largeur minimale des joints entre éléments de revêtement céramique collé (pose à joint nul interdite)"
      seuil: "Carreaux pressés : ≥ 2 mm (surface ≤ 500 cm²), ≥ 3 mm (> 500 cm²) ; carreaux à chants rectifiés et pierres naturelles : ≥ 2 mm ; carreaux étirés et plaquettes terre cuite : ≥ 6 mm"
      condition: "Pose collée ; largeur nominale = minimale + tolérance dimensionnelle du carreau"
      ref: "NF DTU 52.2 P1-1-1 (juin 2022) §7.3.5"
      statut: verifie
      source: "Reef ABQO-3 §7.3.5 — lu verbatim 2026-06-18"

    - exigence: "Épaisseur minimale des chapes et dalles rapportées adhérentes"
      seuil: "Chape adhérente : ≥ 3 cm ; dalle adhérente : ≥ 5 cm"
      condition: "Chapes/dalles rapportées adhérentes au support"
      ref: "NF DTU 26.2 P1-1 (avril 2008) §7.3.2"
      statut: verifie
      source: "Reef ABEW-2 §7.3.2 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Pente d'écoulement des chapes/dalles en locaux avec évacuation d'eau"
      seuil: "Pente minimale de 1 cm/m dans les locaux intérieurs munis d'un dispositif d'évacuation (siphon, caniveau). NOTE : sous 2 cm/m, de légères retenues d'eau sont possibles du fait des tolérances de planéité"
      condition: "Locaux intérieurs avec siphon/caniveau de sol (ex. salle d'eau)"
      ref: "NF DTU 26.2 P1-1 (avril 2008) §7.2"
      statut: verifie
      source: "Reef ABEW-2 §7.2 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Domaine d'emploi des chapes/dalles désolidarisées et flottantes"
      seuil: "Désolidarisées : locaux à sollicitations faibles et modérées + cuisines collectives, SAUF locaux avec étanchéité prévue. Flottantes : uniquement locaux à sollicitations faibles"
      condition: "Choix du type de chape selon le local (Amendement A1)"
      ref: "NF DTU 26.2 P1-1 (avril 2008, Amdt A1) §7.4"
      statut: verifie
      source: "Reef ABEW-2 §7.4 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Joints de fractionnement des chapes et dalles"
      seuil: "Réalisés sur au moins 2/3 de la hauteur de la chape/dalle. Adhérentes : tous les 25 m² et au plus tous les 8 m linéaires (surface nue ou peinte), ou tous les 60 m² et ≤ 8 m linéaires (sous revêtement). Désolidarisées/flottantes : tous les 40 m² et au plus tous les 8 m linéaires. + joints secs aux reprises de coulage"
      condition: "Fractionnement des chapes/dalles selon type et destination de surface (Amendement A1)"
      ref: "NF DTU 26.2 P1-1 (avril 2008, Amdt A1) §8.4.1–8.4.3"
      statut: verifie
      source: "Reef ABEW-2 §8.4 — lu 2026-06-29 (validé Namur 2026-06-29)"

  # =====================================================================
  # LOT 09 — Revêtements de sol (parquet)  (NF DTU 51.2 — parquets collés)
  # =====================================================================
  "09":
    - exigence: "Degré d'humidité maximal du support à base de liants hydrauliques avant pose d'un parquet collé"
      seuil: "≤ 3 % en poids (mesure à la bombe au carbure, méthode de référence) ; pré-test par impédance déclenchant le test bombe au carbure au-delà de 5 % (liant hydraulique) ou 0,8 % (sulfate de calcium)"
      condition: "Supports à base de liants hydrauliques (chape/dalle/plancher béton) ; parquet collé"
      ref: "NF DTU 51.2 P1-1 (mars 2023) §5.2.6.6"
      statut: verifie
      source: "Reef ABYY-4 §5.2.6.6 — lu verbatim 2026-06-18"

    - exigence: "Humidité résiduelle admissible du support avant pose d'un sol souple"
      seuil: "Support à base de liants hydrauliques : siccité ≤ 4 % en poids, mesurée à la bombe au carbure (méthode de référence, Annexe B). Pré-repérage possible par impédance ; le test bombe au carbure reste requis tant que l'impédance dépasse 5 % (liants hydrauliques) ou 0,8 % (sulfate de calcium)"
      condition: "Avant enduit de sol et pose du revêtement souple ; support à base de liants hydrauliques"
      ref: "NF DTU 53.12 P1-1-1 §6.1.5.1"
      statut: verifie
      source: "Reef ALWL-1 §6.1.5.1 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Fissures admissibles du support avant pose d'un sol souple"
      seuil: "Pose possible uniquement en l'absence de fissures de largeur > 0,3 mm. Fissures ≤ 0,3 mm : pas de traitement particulier. Fissures de 0,3 à 0,8 mm : traitement requis (§9.1.1.2). Fissures > 0,8 mm : hors domaine du DTU"
      condition: "Reconnaissance du support à base de liants hydrauliques"
      ref: "NF DTU 53.12 P1-1-1 §6.1.5.3"
      statut: verifie
      source: "Reef ALWL-1 §6.1.5.3 — lu 2026-06-29 (validé Namur 2026-06-29)"

    - exigence: "Cohésion de surface minimale du support avant pose d'un sol souple"
      seuil: "Cohésion de surface ≥ 0,5 MPa ; en deçà, la pose d'un enduit de sol et d'un revêtement collé ou tendu n'est pas possible (traitement du support à commander)"
      condition: "Reconnaissance du support (essai de cohésion de surface, Tableau 3)"
      ref: "NF DTU 53.12 P1-1-1 §6.1.5.4"
      statut: verifie
      source: "Reef ALWL-1 §6.1.5.4 — lu 2026-06-29 (validé Namur 2026-06-29)"

  # =====================================================================
  # LOT 10 — Peinture / Revêtements muraux  (NF DTU 59.1)
  # =====================================================================
  "10":
    - exigence: "Conditions hygrothermiques minimales d'application des peintures, vernis et enduits"
      seuil: "Travaux intérieurs : température +8 °C à +35 °C, hygrométrie < 70 % HR. Travaux extérieurs : température (ambiante et subjectile) +5 °C à +35 °C, hygrométrie ≤ 80 % HR"
      condition: "Jamais sur subjectile gelé/surchauffé ni en atmosphère de condensation ; climat tropical : 75 % HR (int.) / 90 % HR (ext.)"
      ref: "NF DTU 59.1 P1-1 (juin 2013) §7.1"
      statut: verifie
      source: "Reef AEZO-2 §7.1 — lu verbatim 2026-06-18"

  # =====================================================================
  # LOTS SANS RÈGLE ÉTAGE 0 (vérifié 2026-06-19) — lots organisationnels / méta, pas de
  # DTU ni de seuil chiffré normatif à inscrire (rules_for_lot renvoie [] proprement) :
  #   00 — Installation de chantier (préparation, protections, manutention)
  #   01 — Démolition / Dépose / Curage (les déposes restent dans les lots métier)
  #   11 — Cuisine / Salle de bain (forfaits) — LOT MÉTA (agrège d'autres lots)
  #   12 — Nettoyage fin de chantier
  # → étage 0 couvre les lots à seuils chiffrés : 02,03,04,05,06,07,08,09,10.
  # =====================================================================
