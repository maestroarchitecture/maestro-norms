# Mapping normatif PAR LOT — base de justification du devis Maestro
# ------------------------------------------------------------------
# Relie chaque lot expert-travaux à : (a) ses DTU/NF de référence (citation seule),
# (b) les Recommandations Professionnelles / Guides RAGE-PACTE-PROFEEL (gratuit, plein
# texte) qui le justifient.
#
# Source des lots + dtu_refs :
#   maestro-platform/packages/maestro/pro/backend/agents/skills/expert_travaux/knowledge.yaml
# Statut sources :
#   verifie     = URL testée ici (HTTP 200 + en-tête %PDF)
#   liste       = référencée dans docs/norms-guides-index.md, non re-testée
#   page        = page ressource (pas un PDF direct)
#   indisponible= source d'origine morte/parquée (à récupérer via miroir/archive)
#
# Licence : RAGE/PACTE/PROFEEL = téléchargeable plein texte ; DTU/NF/FFB = citation seule.

meta:
  generated: "2026-06-04"
  lots_source: "expert_travaux/knowledge.yaml"
  download_done: false          # choix utilisateur : mapping/plan d'abord
  licence:
    rage_pacte_profeel: "gratuit_plein_texte"
    dtu_nf_ffb: "citation_seule"

# justification:
#   reco_pro_gratuit    = au moins une Reco Pro/Guide RAGE gratuit mappé
#   dtu_citation_seule  = pas de Reco Pro RAGE ; seuls DTU/NF en citation
